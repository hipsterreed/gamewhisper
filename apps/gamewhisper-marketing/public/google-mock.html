<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google Mock – Auto Type</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: arial, sans-serif;
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    /* ── Top nav ── */
    .top-nav {
      width: 100%;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 16px;
      padding: 12px 20px;
      font-size: 13px;
    }
    .top-nav a { color: #202124; text-decoration: none; }
    .top-nav a:hover { text-decoration: underline; }
    .signin-btn {
      background: #1a73e8;
      color: #fff !important;
      border-radius: 4px;
      padding: 8px 18px;
      font-weight: 500;
      font-size: 14px;
    }
    .signin-btn:hover { background: #1765cc; text-decoration: none !important; }

    /* ── Main content ── */
    .main {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 100px;
      width: 100%;
    }

    /* ── Google logo ── */
    .logo {
      margin-bottom: 28px;
    }

    /* ── Search bar ── */
    .search-wrapper {
      position: relative;
      width: 560px;
      max-width: 90vw;
    }

    .search-bar {
      width: 100%;
      height: 46px;
      border: 1px solid #dfe1e5;
      border-radius: 24px;
      padding: 0 48px 0 52px;
      font-size: 16px;
      color: #202124;
      outline: none;
      background: #fff;
      caret-color: #202124;
      box-shadow: none;
      transition: box-shadow 0.15s, border-color 0.15s;
      cursor: text;
    }
    .search-bar:focus,
    .search-bar.active {
      box-shadow: 0 1px 6px rgba(32,33,36,.28);
      border-color: rgba(223,225,229,0);
      border-radius: 24px 24px 0 0;
    }

    /* Search icon (left) */
    .search-icon-left {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
    }

    /* Right icons */
    .search-icons-right {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .search-icons-right svg { cursor: pointer; }

    /* ── Dropdown ── */
    .dropdown {
      display: none;
      position: absolute;
      top: 44px;
      left: 0;
      right: 0;
      background: #fff;
      border: 1px solid #dfe1e5;
      border-top: none;
      border-radius: 0 0 24px 24px;
      box-shadow: 0 4px 6px rgba(32,33,36,.28);
      overflow: hidden;
      z-index: 10;
    }
    .dropdown.visible { display: block; }
    .dropdown-divider {
      height: 1px;
      background: #e8eaed;
      margin: 0 14px;
    }
    .dropdown-row {
      display: flex;
      align-items: center;
      padding: 10px 16px;
      gap: 14px;
      font-size: 14px;
      color: #202124;
      cursor: pointer;
    }
    .dropdown-row:hover { background: #f8f9fa; }
    .dropdown-row .suggestion-text { flex: 1; }
    .dropdown-row .arrow-icon { color: #9aa0a6; }

    /* ── Buttons ── */
    .button-row {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }
    .g-btn {
      background: #f8f9fa;
      border: 1px solid #f8f9fa;
      border-radius: 4px;
      color: #3c4043;
      font-size: 14px;
      padding: 0 16px;
      height: 36px;
      cursor: pointer;
    }
    .g-btn:hover {
      border-color: #dadce0;
      box-shadow: 0 1px 1px rgba(0,0,0,.1);
    }

    /* ── Config panel (hidden during recording) ── */
    .config-panel {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #fff;
      border: 1px solid #dadce0;
      border-radius: 8px;
      padding: 16px;
      width: 340px;
      box-shadow: 0 2px 10px rgba(0,0,0,.15);
      font-size: 13px;
      z-index: 100;
    }
    .config-panel h3 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #202124;
    }
    .config-panel label {
      display: block;
      color: #5f6368;
      margin-bottom: 4px;
      margin-top: 10px;
    }
    .config-panel input[type="text"],
    .config-panel textarea {
      width: 100%;
      border: 1px solid #dadce0;
      border-radius: 4px;
      padding: 6px 8px;
      font-size: 13px;
      font-family: inherit;
      color: #202124;
      outline: none;
    }
    .config-panel textarea { resize: vertical; height: 72px; }
    .config-panel input[type="range"] { width: 100%; }
    .config-actions {
      display: flex;
      gap: 8px;
      margin-top: 14px;
    }
    .config-actions button {
      flex: 1;
      padding: 7px 0;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
    }
    .btn-play { background: #1a73e8; color: #fff; }
    .btn-play:hover { background: #1765cc; }
    .btn-reset { background: #f8f9fa; color: #3c4043; border: 1px solid #dadce0; }
    .btn-reset:hover { background: #e8eaed; }
    .btn-hide { background: #f8f9fa; color: #3c4043; border: 1px solid #dadce0; font-size: 12px; }
    .config-panel .speed-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .config-panel .speed-label { white-space: nowrap; font-size: 12px; color: #5f6368; width: 38px; }

    /* show-config button (when panel is hidden) */
    #show-config-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 20px;
      padding: 8px 16px;
      font-size: 13px;
      cursor: pointer;
      display: none;
      box-shadow: 0 2px 6px rgba(0,0,0,.2);
    }
    #show-config-btn:hover { background: #1765cc; }
  </style>
</head>

<div class="config-panel" id="config-panel">
  <h3>⚙ Auto-Type Config</h3>

  <label>Search query to type</label>
  <textarea id="cfg-text">How do you make a mana potion in Enshrouded</textarea>

  <label>Typing speed</label>
  <div class="speed-row">
    <span class="speed-label" id="speed-display">28 ms</span>
    <input type="range" id="cfg-speed" min="15" max="300" value="28">
  </div>

  <label>Start delay (ms)</label>
  <input type="text" id="cfg-delay" value="1500">

  <div class="config-actions">
    <button class="btn-play" id="btn-play">▶ Play</button>
    <button class="btn-reset" id="btn-reset">↺ Reset</button>
    <button class="btn-hide" id="btn-hide">Hide</button>
  </div>
</div>

<button id="show-config-btn">⚙ Config</button>

<script>
  const input = document.getElementById('search-input');
  const dropdown = document.getElementById('dropdown');

  const cfgText    = document.getElementById('cfg-text');
  const cfgSpeed   = document.getElementById('cfg-speed');
  const cfgDelay   = document.getElementById('cfg-delay');
  const speedDisp  = document.getElementById('speed-display');
  const btnPlay    = document.getElementById('btn-play');
  const btnReset   = document.getElementById('btn-reset');
  const btnHide    = document.getElementById('btn-hide');
  const configPanel = document.getElementById('config-panel');
  const showCfgBtn  = document.getElementById('show-config-btn');

  let typeTimer = null;

  cfgSpeed.addEventListener('input', () => {
    speedDisp.textContent = cfgSpeed.value + ' ms';
  });

  btnHide.addEventListener('click', () => {
    configPanel.style.display = 'none';
    showCfgBtn.style.display = 'block';
  });
  showCfgBtn.addEventListener('click', () => {
    configPanel.style.display = '';
    showCfgBtn.style.display = 'none';
  });

  btnReset.addEventListener('click', resetAll);
  btnPlay.addEventListener('click', startTyping);

  function resetAll() {
    clearTimeout(typeTimer);
    input.value = '';
    input.classList.remove('active');
    dropdown.classList.remove('visible');
    btnPlay.disabled = false;
    btnPlay.textContent = '▶ Play';
  }

  // ── Animation sequence ──────────────────────────────────────────
  // Tuned for ~8 seconds total at default 28ms typing speed
  // Each step: { pause, type, backspace, clear, rage }
  const SEQUENCE = [
    { pause: 300 },
    { type: 'How do i ' },
    { pause: 400 },
    { type: 'make a mana potion in Enshrouded' },
    { pause: 800 },
    { backspace: 'make a mana potion in Enshrouded'.length },
    { pause: 200 },
    { type: 'find iron ore in Valheim' },
    { pause: 800 },
    { backspace: 'find iron ore in Valheim'.length },
    { pause: 200 },
    { type: 'beat Malenia Elden Ring' },
    { pause: 700 },
    { clear: true },
    { pause: 200 },
    { rage: 'asdfkjl;qowieurzxcvb' },
  ];

  function jitter(base, pct = 0.25) {
    return base - base * pct + Math.random() * base * pct * 2;
  }

  function startTyping() {
    resetAll();
    btnPlay.disabled = true;
    btnPlay.textContent = '…';

    input.classList.add('active');
    dropdown.classList.add('visible');

    const TYPE_MS   = parseInt(cfgSpeed.value, 10);
    const BS_MS     = Math.round(TYPE_MS * 0.55);  // backspace faster than typing
    const RAGE_MS   = 55;                            // frantic but readable

    let stepIdx = 0;
    let charIdx = 0;

    function tick() {
      if (stepIdx >= SEQUENCE.length) {
        btnPlay.disabled = false;
        btnPlay.textContent = '▶ Play';
        return;
      }

      const step = SEQUENCE[stepIdx];

      if (step.pause !== undefined) {
        stepIdx++;
        charIdx = 0;
        typeTimer = setTimeout(tick, step.pause);

      } else if (step.type !== undefined) {
        if (charIdx < step.type.length) {
          input.value += step.type[charIdx];
          charIdx++;
          typeTimer = setTimeout(tick, jitter(TYPE_MS));
        } else {
          stepIdx++;
          charIdx = 0;
          tick();
        }

      } else if (step.backspace !== undefined) {
        if (charIdx < step.backspace) {
          input.value = input.value.slice(0, -1);
          charIdx++;
          typeTimer = setTimeout(tick, jitter(BS_MS));
        } else {
          stepIdx++;
          charIdx = 0;
          tick();
        }

      } else if (step.clear) {
        input.value = '';
        stepIdx++;
        charIdx = 0;
        typeTimer = setTimeout(tick, 0);

      } else if (step.rage !== undefined) {
        if (charIdx < step.rage.length) {
          input.value += step.rage[charIdx];
          charIdx++;
          typeTimer = setTimeout(tick, jitter(RAGE_MS, 0.4));
        } else {
          stepIdx++;
          charIdx = 0;
          tick();
        }
      }
    }

    typeTimer = setTimeout(tick, 0);
  }
</script>
